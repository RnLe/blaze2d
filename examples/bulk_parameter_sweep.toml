# Bulk parameter sweep example (config schema v2)
# Sweeps execute in TOML order: radius (outer) -> eps_bg -> polarization (inner)
# Total: 5 radii x 5 eps x 2 pol = 50 jobs
#
# Base values for non-swept parameters come from the main sections:
# eps_bg from [geometry], resolution from [grid].nx, polarization from [solver].

schema = 2

[run]
threads = 8
verbose = true

[solver]
type = "maxwell"
polarization = "TM"

[geometry]
eps_bg = 12.0

[geometry.lattice]
type = "square"
a = 1.0

[[geometry.atoms]]
pos = [0.5, 0.5]
radius = 0.3
eps_inside = 1.0

[grid]
nx = 32

[path]
preset = "auto"
points_per_segment = 12

# =============================================================================
# ORDERED SWEEPS - First sweep = outermost loop
# =============================================================================

[[sweeps]]
parameter = "atom0.radius"
min = 0.2
max = 0.4
step = 0.05

[[sweeps]]
parameter = "eps_bg"
min = 10.0
max = 14.0
step = 1.0

[[sweeps]]
parameter = "polarization"
values = ["TM", "TE"]

[eigensolver]
n_bands = 8
max_iter = 200
tol = 1e-4

[dielectric]
smoothing = "analytic"

[output]
mode = "full"
directory = "./bulk_output"
prefix = "sweep"
