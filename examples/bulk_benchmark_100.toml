# Benchmark: ~100 jobs for quick performance tests (config schema v2)
# 2 lattices x 2 pol x 5 eps x 5 radii = 100 jobs
# preset = "auto" resolves the k-path per job from the swept lattice type.

schema = 2

[solver]
type = "maxwell"
polarization = "TM"

[geometry]
eps_bg = 8.0

[geometry.lattice]
type = "square"
a = 1.0

[[geometry.atoms]]
pos = [0.0, 0.0]
radius = 0.30
eps_inside = 1.0

[grid]
nx = 32

[path]
preset = "auto"

[[sweeps]]
parameter = "lattice_type"
values = ["square", "triangular"]

[[sweeps]]
parameter = "polarization"
values = ["TE", "TM"]

[[sweeps]]
parameter = "eps_bg"
min = 2.0
max = 6.0
step = 1.0

[[sweeps]]
parameter = "atom0.radius"
min = 0.10
max = 0.30
step = 0.05

[eigensolver]
n_bands = 10

[output]
mode = "full"
directory = "./benchmark_100_output"
