# Minimal bulk sweep (config schema v2): radius x polarization = 10 jobs

schema = 2

[run]
verbose = true

[solver]
type = "maxwell"
polarization = "TM"

[geometry]
eps_bg = 13.0

[geometry.lattice]
type = "square"
a = 1.0

[[geometry.atoms]]
pos = [0.5, 0.5]
radius = 0.3
eps_inside = 1.0

[grid]
nx = 32

[path]
preset = "auto"
points_per_segment = 10

[[sweeps]]
parameter = "atom0.radius"
min = 0.2
max = 0.4
step = 0.05

[[sweeps]]
parameter = "polarization"
values = ["TM", "TE"]

[eigensolver]
n_bands = 8
max_iter = 200
tol = 1e-4

[output]
mode = "full"
directory = "./simple_sweep_output"
prefix = "job"
