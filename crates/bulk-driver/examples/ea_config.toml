# ============================================================================
# Blaze2D Bulk Driver - Operator-Data Extraction Example (config schema v2)
# ============================================================================
#
# The operator_data solver runs the Maxwell eigenproblem at one (R, k0) point
# and extracts multi-band quantities: velocity matrices, the Löwdin-corrected
# inverse mass tensor, and the Born-Huang scalar potential. Downstream users
# may consume these for envelope-approximation models of moiré lattices.
#
# Note: this solver runs on the native bulk driver only (not in WASM), and
# does not support parameter sweeps.
# ============================================================================

schema = 2

[run]
threads = 4
verbose = true

[solver]
type = "operator_data"   # alias: "ea"
polarization = "TE"

[geometry]
eps_bg = 12.0

[geometry.lattice]
type = "triangular"
a = 1.0

[[geometry.atoms]]
pos = [0.0, 0.0]
radius = 0.3
eps_inside = 1.0

[grid]
nx = 64

[operator_data]
# Carrier momentum k0 in Cartesian reciprocal-space units (2*pi/a).
k0 = [0.0, 0.0]

# Active subspace: retained bands + remote bands for Löwdin corrections.
n_retained = 4
n_remote = 8

# Which quantities to compute.
compute_mass_tensor = true
compute_born_huang = false
compute_slow_coefficient = false

# Dielectric derivatives for R-derivative matrix elements.
compute_r_derivatives = true
atom_index = 0           # which atom to differentiate w.r.t.
fd_step = 0.001          # finite-difference step (fractional coords)

[eigensolver]
n_bands = 12
tol = 1e-10
max_iter = 500

[output]
mode = "full"
directory = "./operator_data_output"
prefix = "od_job"
