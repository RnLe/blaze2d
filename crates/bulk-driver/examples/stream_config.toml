# ============================================================================
# Blaze2D Bulk Driver - Streaming Mode Example (config schema v2)
# ============================================================================
#
# Demonstrates selective output for Python/WASM consumers. Results are
# emitted as computed, enabling live plotting and progressive UI.
# ============================================================================

schema = 2

# ----------------------------------------------------------------------------
# DRIVER
# ----------------------------------------------------------------------------
[run]
threads = 4          # omit for all physical cores; ignored in WASM
verbose = false

[solver]
type = "maxwell"     # "maxwell" (photonic) or "operator_data" (alias "ea")
polarization = "TM"

# ----------------------------------------------------------------------------
# GEOMETRY
# ----------------------------------------------------------------------------
[geometry]
eps_bg = 12.0        # Background eps (1.0 = air, 12.0 = Si/GaAs)

[geometry.lattice]
type = "square"      # square | rectangular | triangular | oblique | custom
a = 1.0

[[geometry.atoms]]
pos = [0.5, 0.5]     # Fractional coords, each in [0, 1)
radius = 0.2         # In units of lattice constant a, in (0, 0.5)
eps_inside = 1.0     # Air hole in dielectric

# ----------------------------------------------------------------------------
# COMPUTATIONAL SETTINGS
# ----------------------------------------------------------------------------
[grid]
nx = 32              # ny defaults to nx

[path]
preset = "auto"          # resolves from the lattice type
points_per_segment = 12  # k-points per segment

[eigensolver]
n_bands = 8
tol = 1e-8
max_iter = 200

[dielectric]
smoothing = "analytic"   # analytic (default) | subgrid | none

# ----------------------------------------------------------------------------
# SWEEPS - Ordered parameter variations
# ----------------------------------------------------------------------------
# Each [[sweeps]] = one nested loop dimension. First = outermost.
# Total jobs = product of all sweep counts.

[[sweeps]]
parameter = "atom0.radius"
min = 0.15
max = 0.35
step = 0.05            # 5 values: 0.15, 0.20, 0.25, 0.30, 0.35

# ----------------------------------------------------------------------------
# OUTPUT
# ----------------------------------------------------------------------------
[output]
mode = "selective"     # "full" (1 CSV/job) or "selective" (merged CSV)
directory = "./sweep_output"
filename = "./sweep_results.csv"

[output.selective]
k_indices = [0, 12, 24, 36]   # Gamma, X, M, Gamma (0-based)
k_labels = ["Γ", "X", "M", "Γ"]
bands = [1, 2, 3, 4]          # 1-based band indices

# ============================================================================
# RESULT STRUCTURE (Python/WASM)
# ============================================================================
#
# Each streamed result dict contains:
#
#   job_index     : int           - Job number (completion order, not sweep order)
#   result_type   : str           - "maxwell"
#   num_k_points  : int           - Length of k_path
#   num_bands     : int           - Number of bands computed
#   k_path        : [[kx,ky],...] - K-points in fractional coords
#   distances     : [float,...]   - Cumulative path distance for plotting
#   bands         : [[w1,w2,...],...] - Frequencies at each k-point (w/2pi normalized)
#
#   params        : dict          - Full configuration for this job
#     eps_bg, resolution, polarization, lattice_type, atoms: [...]
#
#   sweep_values  : dict          - Current sweep parameter values
#     e.g., {"atom0.radius": 0.25}
#
#   sweep_order   : str           - Parseable string "param1=val1|param2=val2"
#
# Note: Results arrive in completion order (parallel). Use sweep_order for sorting.
# ============================================================================
