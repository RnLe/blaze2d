# =============================================================================
# Blaze2D WASM Tutorial: Square Lattice Photonic Crystal Band Structure
# (config schema v2)
# =============================================================================
#
# This configuration computes the band structure for a classic 2D photonic
# crystal: dielectric rods in air arranged on a square lattice.
#
# Every Blaze2D config starts with `schema = 2`. A config without [[sweeps]]
# entries describes exactly one job.
#
# WASM MODULE SETUP
# -----------------
#
# 1. Build the WASM module:
#    $ make wasm
#
# 2. Copy wasm-dist/ to your Next.js public folder:
#    $ cp -r wasm-dist/* my-nextjs-app/public/wasm/
#
# 3. Or use in a plain web project by serving the files from any static host.
#
# =============================================================================
# K-POINT STREAMING (RECOMMENDED FOR REAL-TIME VISUALIZATION)
# =============================================================================
#
# K-point streaming provides real-time updates as EACH k-point is solved,
# enabling smooth progressive rendering of band diagrams.
#
# ```typescript
# import init, { WasmBulkDriver, validateConfig } from '/wasm/blaze2d_backend_wasm.js';
#
# async function computeWithStreaming() {
#     await init();
#
#     const configToml = await fetch('/examples/square_lattice_tutorial.toml')
#         .then(res => res.text());
#
#     // Optional: validate first for structured diagnostics
#     // const report = validateConfig(configToml);
#     // if (!report.ok) { console.error(report.errors); return; }
#
#     const driver = new WasmBulkDriver(configToml);
#
#     const distances: number[] = [];
#     const bandsData: number[][] = [];  // bandsData[k_index] = frequencies at k
#
#     // K-POINT STREAMING: callback fires after EACH k-point solve
#     const stats = driver.runWithKPointStreaming((kResult) => {
#         // kResult.k_index: which k-point (0 to total_k_points-1)
#         // kResult.progress: 0.0 to 1.0
#         // kResult.distance: path distance to this k-point
#         // kResult.omegas: frequencies for all bands at this k
#         distances.push(kResult.distance);
#         bandsData.push([...kResult.omegas]);
#         updatePlotProgressive(distances, bandsData);
#     });
#
#     console.log(`Complete in ${stats.total_time_ms}ms`);
# }
# ```
#
# JOB-LEVEL STREAMING (runWithCallback) fires once per job (whole band
# structure) and is the right mode for parameter sweeps. COLLECT mode
# (runCollect) returns everything at once. SELECTIVE filtering
# (runStreamingFiltered) restricts to specific k-points and bands.
#
# K-POINT result object:
# {
#     stream_type: 'k_point',
#     job_index: 0,
#     k_index: 5,
#     total_k_points: 37,
#     k_point: [0.5, 0],           // [kx, ky] fractional
#     distance: 0.5,
#     omegas: [0.0, 0.15, 0.32],   // normalized: w*a/(2*pi*c)
#     bands: [0.0, 0.15, 0.32],    // alias of omegas
#     iterations: 45,
#     is_gamma: false,
#     progress: 0.162,
#     num_bands: 8,
#     params: { ... }
# }
#
# =============================================================================
# The configuration itself
# =============================================================================

schema = 2

[solver]
type = "maxwell"
# TM (E-field out of plane) shows the classic band gap for rods in air.
polarization = "TM"

# =============================================================================
# Geometry Configuration
# =============================================================================
[geometry]
# Background permittivity (air = 1.0)
eps_bg = 1.0

[geometry.lattice]
# Lattice type: square | rectangular | triangular | oblique | custom
type = "square"
# Lattice constant (sets the length scale, typically a = 1.0)
a = 1.0

# Atoms in the unit cell (can have multiple [[geometry.atoms]] sections)
[[geometry.atoms]]
# Position in fractional coordinates, each component in [0, 1)
pos = [0.5, 0.5]
# Radius as fraction of lattice constant, in (0, 0.5)
radius = 0.2
# Permittivity inside the cylinder (Si ~ 12, GaAs ~ 13)
eps_inside = 12.0

# =============================================================================
# Grid Configuration
# =============================================================================
[grid]
# Resolution (ny defaults to nx). 32 is good for quick tests,
# 64-128 for production.
nx = 32

# =============================================================================
# K-Path Configuration
# =============================================================================
[path]
# "auto" resolves the standard path from the lattice type:
# square: Gamma -> X -> M -> Gamma
preset = "auto"
# Number of k-points per path segment. Square has 3 legs -> 37 total points.
points_per_segment = 12

# =============================================================================
# Eigensolver Configuration
# =============================================================================
[eigensolver]
# Number of bands to compute (lowest frequencies)
n_bands = 8
# Maximum LOBPCG iterations
max_iter = 200
# Convergence tolerance (relative eigenvalue change)
tol = 1e-4
